            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e8edf2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .phone-frame {
            width: 390px;
            max-width: 100%;
            background: #f4f9f7;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 844px;
            max-height: 100vh;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }

        .pages-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 20px 20px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .pages-container::-webkit-scrollbar {
            width: 0;
            display: none;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: -0.3px;
        }
        .page-header h1 span {
            color: #4a9e8e;
        }
        .page-header .sub {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: 400;
            background: #eef2f6;
            padding: 4px 14px;
            border-radius: 20px;
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .mode-tab {
            flex: 1;
            min-width: 80px;
            padding: 10px 0;
            border: 2px solid #d5dce4;
            border-radius: 30px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
        }
        .mode-tab.active {
            background: #4a9e8e;
            border-color: #4a9e8e;
            color: #fff;
            box-shadow: 0 4px 12px rgba(74, 158, 142, 0.25);
        }
        .mode-tab i {
            margin-right: 4px;
        }

        .card-counter {
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .card-counter strong {
            color: #2c3e50;
            font-size: 18px;
        }

        .flashcard {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 24px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(200, 212, 220, 0.25);
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            position: relative;
        }
        .flashcard:active {
            transform: scale(0.98);
        }

        .flashcard .card-front {
            width: 100%;
        }
        .flashcard .card-front .main-word {
            font-size: 34px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.3;
            letter-spacing: -0.3px;
            word-break: break-word;
        }
        .flashcard .card-front .main-word.chinese-mode {
            font-size: 26px;
            color: #2c3e50;
        }
        .flashcard .card-front .main-word.small-word {
            font-size: 24px;
        }
        .flashcard .card-front .main-word.small-word.chinese-mode {
            font-size: 20px;
        }

        .flashcard .card-back {
            width: 100%;
            display: none;
            animation: fadeUp 0.25s ease;
        }
        .flashcard .card-back .meaning {
            font-size: 34px;
            font-weight: 700;
            color: #4a9e8e;
            line-height: 1.4;
        }
        .flashcard .card-back .meaning.chinese-mode {
            font-size: 26px;
            color: #4a9e8e;
        }
        .flashcard .card-back .meaning.italian-mode {
            font-size: 34px;
            font-weight: 700;
            color: #4a9e8e;
        }
        .flashcard .card-back .meaning.small-meaning {
            font-size: 24px;
        }
        .flashcard .card-back .meaning.small-meaning.chinese-mode {
            font-size: 20px;
        }
        .flashcard .card-back .meaning.small-meaning.italian-mode {
            font-size: 24px;
        }

        .flashcard.show-back .card-front {
            display: none;
        }
        .flashcard.show-back .card-back {
            display: block;
        }

        .flashcard .hint-tap {
            position: absolute;
            bottom: 12px;
            right: 18px;
            font-size: 12px;
            color: #bccbd8;
            letter-spacing: 0.5px;
        }
        .flashcard .hint-tap i {
            margin-right: 4px;
        }

        .audio-btn {
            position: absolute;
            bottom: 12px;
            left: 18px;
            background: rgba(74, 158, 142, 0.12);
            border: none;
            border-radius: 30px;
            padding: 6px 14px 6px 10px;
            font-size: 13px;
            color: #4a9e8e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            transition: 0.2s;
            backdrop-filter: blur(2px);
        }
        .audio-btn:hover {
            background: rgba(74, 158, 142, 0.2);
        }
        .audio-btn:active {
            transform: scale(0.92);
        }
        .audio-btn i {
            font-size: 15px;
        }
        .audio-btn .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4a9e8e;
            transition: 0.2s;
        }
        .audio-btn .status-dot.playing {
            background: #e67e22;
            animation: pulse-dot 0.8s infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .nav-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .nav-row button {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 18px;
            background: #e8f0ee;
            color: #4a9e8e;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .nav-row button:active {
            transform: scale(0.95);
        }
        .nav-row button.primary {
            background: #4a9e8e;
            color: #fff;
        }
        .nav-row button.primary:active {
            background: #3a7a6e;
        }
        .nav-row button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .bottom-meta {

            justify-content: space-between;
            font-size: 13px;
            color: #a0b4c4;
            padding: 0 4px;

            padding: 4px 16px;

            color: #2c3e50;
            font-weight: 500;
        }

        .footer-copyright {

            text-align: center;
            font-size: 12px;
            color: #9aabb8;
            line-height: 1.8;
            letter-spacing: 0.3px;

            border-radius: 12px;
            display: inline-block;
            margin-top: 2px;
        }

            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {

                transform: translateY(0);
            }

</head>

        console.log('✅ 第3单元 总词条数:', RAW_WORDS.length);

        // ============================================================
        // 状态
        // ============================================================
        let mode = 'order';
        let currentIndex = 0;
        let currentList = [];
        let learnedSet = new Set();

        let audioElement = null;
        let isAudioPlaying = false;

        // DOM
        const flashcard = document.getElementById('flashcard');
        const mainWord = document.getElementById('mainWord');
        const meaningBack = document.getElementById('meaningBack');
        const currentNum = document.getElementById('currentNum');
        const totalNum = document.getElementById('totalNum');
        const learnedCount = document.getElementById('learnedCount');
        const progressText = document.getElementById('progressText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const audioBtn = document.getElementById('audioBtn');
        const audioLabel = document.getElementById('audioLabel');
        const audioDot = document.getElementById('audioDot');

        // ============================================================
        // 工具
        // ============================================================
        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getDisplayList() {
            if (mode === 'order') return [...RAW_WORDS];
            if (mode === 'shuffle') return shuffleArray(RAW_WORDS);
            if (mode === 'chinese') return [...RAW_WORDS];
            return [...RAW_WORDS];
        }

        function isLongWord(text) {
            return text && text.length > 22;
        }

        function getRawIndex(wordObj) {
            return RAW_WORDS.findIndex(item =>
                item.word === wordObj.word && item.meaning === wordObj.meaning
            );
        }

        // ============================================================
        // 音频 - 文件名格式：第3单元单词表 - segment N.mp3
        // ============================================================
        function getAudioPath(rawIndex) {
            const segNum = rawIndex + 1;
            return `第3单元单词表 - segment ${segNum}.mp3`;
        }

        function playAudio() {
            const currentItem = currentList[currentIndex];
            if (!currentItem) return;

            const rawIndex = getRawIndex(currentItem);
            if (rawIndex === -1) {
                audioLabel.textContent = '未找到';
                audioDot.className = 'status-dot';
                setTimeout(() => { audioLabel.textContent = '发音'; }, 1000);
                return;
            }

            const audioSrc = getAudioPath(rawIndex);
            if (!audioElement) {
                audioElement = new Audio();
                audioElement.addEventListener('ended', () => {
                    isAudioPlaying = false;
                    audioDot.className = 'status-dot';
                    audioLabel.textContent = '发音';
                });
                audioElement.addEventListener('error', () => {
                    isAudioPlaying = false;
                    audioDot.className = 'status-dot';
                    audioLabel.textContent = '⚠️';
                    setTimeout(() => { audioLabel.textContent = '发音'; }, 1200);
                });
            }

            if (isAudioPlaying) {
                audioElement.pause();
                audioElement.currentTime = 0;
                isAudioPlaying = false;
                audioDot.className = 'status-dot';
                audioLabel.textContent = '发音';
                return;
            }

            audioElement.src = audioSrc;
            audioElement.load();
            audioElement.play().then(() => {
                isAudioPlaying = true;
                audioDot.className = 'status-dot playing';
                audioLabel.textContent = '播放中';
            }).catch((err) => {
                console.warn('音频加载失败:', audioSrc, err);
                audioDot.className = 'status-dot';
                audioLabel.textContent = '⚠️';
                setTimeout(() => { audioLabel.textContent = '发音'; }, 1000);
                isAudioPlaying = false;
            });
        }

        function stopAudio() {
            if (audioElement) {
                audioElement.pause();
                audioElement.currentTime = 0;
                isAudioPlaying = false;
                audioDot.className = 'status-dot';
                audioLabel.textContent = '发音';
            }
        }

        // ============================================================
        // 渲染
        // ============================================================
        function renderCard() {
            if (!currentList.length) return;
            const item = currentList[currentIndex];
            const isChineseMode = (mode === 'chinese');

            const wordIsLong = isLongWord(item.word);
            const meaningIsLong = isLongWord(item.meaning);

            if (isChineseMode) {
                mainWord.textContent = item.meaning;
                mainWord.className = 'main-word chinese-mode' + (meaningIsLong ? ' small-word' : '');
            } else {
                mainWord.textContent = item.word;
                mainWord.className = 'main-word' + (wordIsLong ? ' small-word' : '');
            }

            if (isChineseMode) {
                meaningBack.textContent = item.word;
                meaningBack.className = 'meaning italian-mode' + (wordIsLong ? ' small-meaning' : '');
            } else {
                meaningBack.textContent = item.meaning;
                meaningBack.className = 'meaning chinese-mode' + (meaningIsLong ? ' small-meaning' : '');
            }

            flashcard.classList.remove('show-back');

            currentNum.textContent = currentIndex + 1;
            totalNum.textContent = currentList.length;

            learnedCount.textContent = learnedSet.size;
            const progress = currentList.length ? Math.round((learnedSet.size / currentList.length) * 100) : 0;
            progressText.textContent = progress + '%';

            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === currentList.length - 1);

            stopAudio();
        }

        // ============================================================
        // 模式切换
        // ============================================================
        function switchMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            currentIndex = 0;
            learnedSet = new Set();
            currentList = getDisplayList();
            renderCard();
            stopAudio();
        }

        // ============================================================
        // 导航
        // ============================================================
        function nextCard() {
            if (currentIndex < currentList.length - 1) {
                currentIndex++;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            }
        }

        // ============================================================
        // 翻转 & 标记已学
        // ============================================================
        flashcard.addEventListener('click', function(e) {
            if (e.target.closest('.audio-btn')) return;
            this.classList.toggle('show-back');
            if (this.classList.contains('show-back')) {
                const key = currentIndex + '-' + (currentList[currentIndex]?.word || '');
                learnedSet.add(key);
                learnedCount.textContent = learnedSet.size;
                const progress = currentList.length ? Math.round((learnedSet.size / currentList.length) * 100) : 0;
                progressText.textContent = progress + '%';
            }
        });

        // ============================================================
        // 音频按钮
        // ============================================================
        audioBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            playAudio();
        });

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    switchMode(this.dataset.mode);
                });
            });

            prevBtn.addEventListener('click', prevCard);
            nextBtn.addEventListener('click', nextCard);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextCard();
                if (e.key === 'ArrowLeft') prevCard();
                if (e.key === ' ') {
                    e.preventDefault();
                    flashcard.click();
                }
                if (e.key === 'p' || e.key === 'P') {
                    e.preventDefault();
                    playAudio();
                }
            });

            currentList = getDisplayList();
            renderCard();
            console.log(`✨ Fuga学员专属 · 第3单元 闪卡已加载 (共 ${RAW_WORDS.length} 项) ✅`);
            console.log(`📁 音频文件命名格式: 第3单元单词表 - segment 1.mp3 ~ ${RAW_WORDS.length}.mp3`);
        }

        init();
    </script>
